<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SignalOnly Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="surface">
      <section class="module" aria-label="Auto Rotate Fingerprint">
        <header class="module-head compact">
          <div><p class="micro">FINGERPRINT SESSION</p><h2>Auto-Rotate Fingerprint</h2></div>
          <button class="switch-control small" type="button" data-setting="autoRotateFingerprint" aria-pressed="false"><i><b>ON</b><b>OFF</b></i></button>
        </header>
        <p class="section-note">When fingerprint shielding is active, each page load uses a fresh session seed. Turn off to use the static profile values again.</p>
      </section>
      <iframe src="options.html" title="SignalOnly settings" style="width:100%;min-height:92vh;border:0;border-radius:24px"></iframe>
    </main>
    <script src="auto-rotate.js"></script>
  </body>
</html>
